<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeakEasy</title>
  </head>

  <body>
    <script>
      // TEMP crash visibility: paint any uncaught error into the window so a
      // blank screen tells us WHY. Remove before ship.
      window.addEventListener("error", function (e) {
        var d = document.createElement("pre");
        d.style.cssText = "color:#900;background:#fff;padding:16px;white-space:pre-wrap;font:12px monospace;position:fixed;inset:0;z-index:99999;overflow:auto";
        d.textContent = "FRONTEND CRASH\n" + e.message + "\n" + (e.filename||"") + ":" + e.lineno + "\n" + (e.error && e.error.stack || "");
        document.body.appendChild(d);
      }, true);
      window.addEventListener("unhandledrejection", function (e) {
        var d = document.createElement("pre");
        d.style.cssText = "color:#a50;background:#fff;padding:16px;white-space:pre-wrap;font:12px monospace;position:fixed;bottom:0;left:0;right:0;z-index:99998;max-height:40%;overflow:auto";
        d.textContent = "UNHANDLED REJECTION\n" + (e.reason && (e.reason.stack || e.reason.message) || String(e.reason));
        document.body.appendChild(d);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
